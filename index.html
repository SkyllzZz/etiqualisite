<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquali ok</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <div class="logo">
                   <a href="#"><img src="logo.png" alt="Logo Etiquali"></a>
                </div>

                <ul class="menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Contato</a></li>
                    <li><a href="#">Sobre</a></li>
                </ul>                 

                <div class="icons">
                    <a href="Home"><img src="casa.png" alt="Ícone Home"></a>
                    <a href="Sobre"><img src="instagram.png" alt="Instagram"></a>
                    <a href="Contato"><img src="whatsapp.png" alt="Whatsapp"></a>
                </div>
                  
            </div>
        </nav>
    </header>
    
    <main>
        
        <!--Hero = Home, Shop, Blog, Sobre nós-->
        
        <section class="hero">
            <div class="slider">
                    <div class="slides">
                        <img src="Banner01.png" alt="">
                        <img src="Banner02.png" alt="">
                        <img src="Banner03.png" alt="">
                        <img src="Banner01.png" alt="">
                </div>
            </div>

        </section>
        
        <!--Produtos, tags, etiquetas etc..-->

        <section class="categoria"></section>

        <!--Fotos dos produtos em alta qualidade-->

        <section class="produtos">
            <div class="container">
                <h2></h2>

            <!--CSS comentado sobre os Grids.-->

                <div class="grid-produtos">
                    <div class="card">
                        <img src="01.jpg" alt="Sacola de papel">
                        <h3>Triplex c/ Hot Ouro</h3>
                        <p>R$: 10,00</p>
                    </div>
                    <div class="card">
                        <img src="02.jpg" alt="Sacola de papel">
                        <h3>Triplex c/ Verniz Loc.</h3>
                        <p>R$: 15,00</p>
                    </div>
                    <div class="card">
                        <img src="03.jpg" alt="Sacola de papel">
                        <h3>Triplex c/ Hot Ouro</h3>
                        <p>R$: 25,00</p>
                    </div>
                    <div class="card">
                        <img src="04.jpg" alt="Sacola de Papel">
                        <h3>Triplex c/ Verniz Loc.</h3>
                        <p>R$: 15,00</p>
                    </div>
                </div>
            </div>
        </section>

        <!--onde todos as fotos ficarão para cada item especifico-->
        <section class="galeria"></section>

    <footer>

    </footer>

    <script src="script.js"></script>

</html>
